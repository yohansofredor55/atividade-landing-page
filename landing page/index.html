<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Landing Page Simples</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="landing-pai">

      <section class="lado-esquerdo">

        <header class="logo-area">
        <img>
          <h1>CURSO DE PIZZA DO PEPPINO</h1>
        </header>

        <article class="content">
          <p class="subtitle">Aprenda grandes receitas</p>
          <h2>Ganhe o melhor<br />treinamento culinário GRATUITO!</h2>
          <p class="texto">
            Um curso prático que ensina você a transformar sua paixão em pizzas irresistíveis, com receitas testadas e aprovadas por muitas pessoas.

          </p>
        </article>

        <form class="dados">
          <input type="text" placeholder="Seu Nome" />
          <input type="email" placeholder="Seu Telefone" />
          <button type="submit">MATRICULAR-SE</button>
        </form>
      </section>

      <section class="lado-direito">
        <img class="coz" src="Pizza_Tower_spr-vspeppino.png" alt="pessoa" />
      </section>
    </main>
  </body>
</html>
